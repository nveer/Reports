<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathan's HA Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --gray: #475569;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }
    #conn-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface2);
    }
    #conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray);
    }
    #conn-dot.connected { background: var(--green); }
    #conn-dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
    #conn-dot.error { background: var(--red); }
    #last-updated {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .main { padding: 20px; max-width: 1600px; margin: 0 auto; }

    .section {
      margin-bottom: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .section-header:hover { background: var(--border); }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }
    .section-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .section-chevron { transition: transform 0.2s; font-size: 12px; }
    .section.collapsed .section-chevron { transform: rotate(-90deg); }
    .section.collapsed .section-body { display: none; }

    .section-search {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .section-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .section-search input:focus { border-color: var(--accent); }

    .entity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
    }
    .entity-card {
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.15s;
    }
    .entity-card:hover { background: var(--surface2); }
    .entity-card.hidden { display: none; }

    .entity-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-on, .dot-active, .dot-occupied { background: var(--green); }
    .dot-off, .dot-disabled { background: var(--red); }
    .dot-clear { background: var(--gray); }
    .dot-unavailable { background: var(--gray); opacity: 0.4; }
    .dot-unknown { background: var(--yellow); }

    .entity-name {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .entity-state {
      font-size: 12px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .state-on { background: rgba(34,197,94,0.15); color: var(--green); }
    .state-off { background: rgba(239,68,68,0.12); color: var(--red); }
    .state-occupied { background: rgba(34,197,94,0.15); color: var(--green); }
    .state-clear { background: rgba(71,85,105,0.2); color: var(--gray); }
    .state-unavailable { background: rgba(71,85,105,0.15); color: var(--text-muted); }
    .state-unknown { background: rgba(245,158,11,0.15); color: var(--yellow); }

    .entity-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .entity-id {
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .entity-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* EP Sensors special layout */
    .ep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1px;
      background: var(--border);
    }
    .ep-card {
      background: var(--surface);
      padding: 16px;
    }
    .ep-card:hover { background: var(--surface2); }
    .ep-location {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ep-sensors {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ep-sensor-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg);
      border-radius: 6px;
    }
    .ep-sensor-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      width: 80px;
      flex-shrink: 0;
    }
    .ep-sensor-state {
      font-size: 12px;
      font-weight: 700;
      flex: 1;
    }
    .ep-sensor-state.detected { color: var(--green); }
    .ep-sensor-state.clear { color: var(--gray); }
    .ep-sensor-state.unavailable { color: var(--text-muted); opacity: 0.5; }
    .ep-time { font-size: 10px; color: var(--text-muted); }

    /* Group labels */
    .group-label {
      grid-column: 1 / -1;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .group-label:first-child { border-top: none; }

    /* Automation specific */
    .auto-last-triggered {
      font-size: 10px;
      color: var(--text-muted);
    }
    .auto-last-triggered span { color: var(--blue); }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-wrap: wrap;
    }
    .stat { font-size: 12px; color: var(--text-muted); }
    .stat strong { color: var(--text); }
    .stat .on { color: var(--green); }
    .stat .off { color: var(--red); }

    @media (max-width: 600px) {
      .main { padding: 12px; }
      .entity-grid { grid-template-columns: 1fr; }
      .ep-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// ÔöÇÔöÇÔöÇ Room grouping for lights/switches ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function getRoom(entity_id) {
  const id = entity_id.split('.')[1];
  if (id.match(/^livingroom|^living_room|^mantel|^eplite_livingroom/)) return '­čŤő´ŞĆ Living Room';
  if (id.match(/^kitchen|^ep_one_kitchen|^epone_kitchen/)) return '­čŹ│ Kitchen';
  if (id.match(/^bedroom|^night_stand|^sleepnumber/)) return '­čŤĆ´ŞĆ Master Bedroom';
  if (id.match(/^bathroom|^master_bathroom|^master_toilet|^epone_master_bathroom/)) return '­čÜ┐ Master Bathroom';
  if (id.match(/^master_hallway/)) return '­čÜ¬ Master Hallway';
  if (id.match(/^office|^ep_one_office|^epone_office|^big_light|^on_air|^fill_light|^left_desk|^right_desk|^overhead_light/)) return '­čĺ╝ Office';
  if (id.match(/^hall|^entryway|^entry_door/)) return '­čÜÂ Entryway / Hall';
  if (id.match(/^diningroom/)) return '­čŹŻ´ŞĆ Dining Room';
  if (id.match(/^garage/)) return '­čÜŚ Garage';
  if (id.match(/^back_porch/)) return '­čî┐ Back Porch';
  if (id.match(/^driveway|^front_yard/)) return '­čĆí Driveway / Front';
  if (id.match(/^laundry/)) return '­čž║ Laundry Room';
  if (id.match(/^guestroom/)) return '­čŤî Guest Room';
  if (id.match(/^plant/)) return '­čî▒ Plants';
  if (id.match(/^wyze_cam|^doorbell|^outdoor_cam|^front_yard_cam|^garage_cam|^driveway_cam/)) return '­čôĚ Cameras';
  if (id.match(/^air_purifier|^dwaynes_air/)) return '­čĺĘ Air Purifiers';
  if (id.match(/^bhyve|^sprinkler/)) return '­čĺž Sprinklers';
  return '­čöž Other';
}

// Switches to hide by default (LED indicators & camera sub-controls)
function isNoiseSwitch(entity_id) {
  const id = entity_id.split('.')[1];
  if (id.endsWith('_led')) return true;
  if (id.match(/(flip_horizontal|flip_vertical|_ir$|motion_tagging|motion_tracking|night_vision|pan_cruise|status_light|_stream$)$/)) return true;
  return false;
}

// Lights to hide (EP internal LEDs)
function isNoiseLight(entity_id) {
  const id = entity_id.split('.')[1];
  return id.match(/^ep_one.*_(esp32_status|mmwave)_led/) || id.match(/^esphome_lite.*_esp32_led/);
}

// ÔöÇÔöÇÔöÇ Formatting ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function timeAgo(isoStr) {
  if (!isoStr) return 'ÔÇô';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function friendlyName(entity_id) {
  return entity_id.split('.')[1]
    .replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function stateDotClass(state, domain) {
  if (state === 'on') return 'dot-on';
  if (state === 'off') {
    if (domain === 'automation') return 'dot-disabled';
    return 'dot-off';
  }
  if (state === 'unavailable' || state === 'unknown') return 'dot-unavailable';
  return 'dot-unknown';
}

function stateLabelClass(state) {
  if (state === 'on') return 'state-on';
  if (state === 'off') return 'state-off';
  if (state === 'unavailable' || state === 'unknown') return 'state-unavailable';
  return 'state-unknown';
}

// ÔöÇÔöÇÔöÇ Render helpers ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function renderEntityCard(entity, domain, extraHtml = '') {
  const s = entity.state;
  const eid = entity.entity_id;
  const name = entity.attributes?.friendly_name || friendlyName(eid);
  const changed = entity.last_changed;
  const dotCls = stateDotClass(s, domain);
  const lblCls = stateLabelClass(s);

  return `
    <div class="entity-card" data-name="${name.toLowerCase()} ${eid.toLowerCase()}" id="card-${eid.replace(/\./g,'-')}">
      <div class="entity-top">
        <div class="status-dot ${dotCls}"></div>
        <span class="entity-name" title="${name}">${name}</span>
        <span class="entity-state ${lblCls}">${s}</span>
      </div>
      ${extraHtml}
      <div class="entity-meta">
        <span class="entity-id">${eid}</span>
        <span class="entity-time">${timeAgo(changed)}</span>
      </div>
    </div>`;
}

// ÔöÇÔöÇÔöÇ Render automations ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function renderAutomations() {
  const autos = Object.values(states)
    .filter(s => s.entity_id.startsWith('automation.'))
    .sort((a,b) => {
      const na = a.attributes?.friendly_name || a.entity_id;
      const nb = b.attributes?.friendly_name || b.entity_id;
      return na.localeCompare(nb);
    });

  const on = autos.filter(a => a.state === 'on').length;
  const off = autos.filter(a => a.state === 'off').length;

  document.getElementById('auto-count').textContent = autos.length;
  document.getElementById('auto-stats').innerHTML =
    `<div class="stat"><strong>${autos.length}</strong> total</div>
     <div class="stat"><span class="on">ÔŚĆ</span> <strong>${on}</strong> enabled</div>
     <div class="stat"><span class="off">ÔŚĆ</span> <strong>${off}</strong> disabled</div>`;

  const grid = document.getElementById('auto-grid');
  const q = grid.parentElement.querySelector('input')?.value.toLowerCase() || '';

  let html = '';
  for (const a of autos) {
    const lastTriggered = a.attributes?.last_triggered;
    const extra = `<div class="auto-last-triggered">Last triggered: <span>${lastTriggered ? timeAgo(lastTriggered) : 'never'}</span></div>`;
    html += renderEntityCard(a, 'automation', extra);
  }
  grid.innerHTML = html;
  if (q) filterSection('auto', q);
}

// ÔöÇÔöÇÔöÇ Render EP sensors ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function renderEP() {
  const epGrid = document.getElementById('ep-grid');
  let html = '';
  let count = 0;

  for (const [location, sensors] of Object.entries(EP_GROUPS)) {
    let rows = '';

    if (sensors.mmwave !== undefined) {
      const labels = {
        mmwave: 'mmWave', occupancy: 'Occupancy', pir: 'PIR',
        co2: 'COÔéé', temp: 'Temp', humidity: 'Humidity',
        cloud: 'Cloud', power_w: 'Power (W)',
      };
      for (const [key, eid] of Object.entries(sensors)) {
        const s = states[eid];
        const sv = s?.state ?? 'unavailable';
        let cls = 'unavailable';
        let displayVal = sv;

        if (['mmwave','occupancy','pir','cloud'].includes(key)) {
          if (sv === 'on') { cls = 'detected'; displayVal = key === 'cloud' ? 'Online' : 'Detected'; }
          else if (sv === 'off') { cls = 'clear'; displayVal = key === 'cloud' ? 'Offline' : 'Clear'; }
        } else if (['co2','temp','humidity','power_w'].includes(key)) {
          cls = 'detected';
          const unit = s?.attributes?.unit_of_measurement || '';
          displayVal = sv !== 'unavailable' ? `${sv} ${unit}` : 'unavailable';
        }

        const changed = s?.last_changed;
        rows += `
          <div class="ep-sensor-row" id="ep-${eid.replace(/\./g,'-')}">
            <span class="ep-sensor-label">${labels[key]}</span>
            <span class="ep-sensor-state ${cls}">${displayVal}</span>
            <span class="ep-time">${timeAgo(changed)}</span>
          </div>`;
        count++;
      }
    }

    html += `
      <div class="ep-card">
        <div class="ep-location">ÔÜí ${location}</div>
        <div class="ep-sensors">${rows}</div>
      </div>`;
  }

  epGrid.innerHTML = html;
  document.getElementById('ep-count').textContent = count + ' sensors';
}

// ÔöÇÔöÇÔöÇ Render lights ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function renderLights() {
  const lights = Object.values(states)
    .filter(s => s.entity_id.startsWith('light.') && !isNoiseLight(s.entity_id))
    .sort((a,b) => {
      const ra = getRoom(a.entity_id), rb = getRoom(b.entity_id);
      if (ra !== rb) return ra.localeCompare(rb);
      return (a.attributes?.friendly_name||a.entity_id).localeCompare(b.attributes?.friendly_name||b.entity_id);
    });

  const on = lights.filter(l => l.state === 'on').length;
  document.getElementById('lights-count').textContent = lights.length;
  document.getElementById('lights-stats').innerHTML =
    `<div class="stat"><strong>${lights.length}</strong> total</div>
     <div class="stat"><span class="on">ÔŚĆ</span> <strong>${on}</strong> on</div>
     <div class="stat"><span class="off">ÔŚĆ</span> <strong>${lights.length - on}</strong> off</div>`;

  const grid = document.getElementById('lights-grid');
  const q = grid.parentElement.querySelector('input')?.value.toLowerCase() || '';

  let html = '';
  let currentRoom = null;
  for (const l of lights) {
    const room = getRoom(l.entity_id);
    if (room !== currentRoom) {
      currentRoom = room;
      html += `<div class="group-label">${room}</div>`;
    }
    html += renderEntityCard(l, 'light');
  }
  grid.innerHTML = html;
  if (q) filterSection('lights', q);
}

// ÔöÇÔöÇÔöÇ Render switches ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function renderSwitches() {
  const switches = Object.values(states)
    .filter(s => s.entity_id.startsWith('switch.'))
    .sort((a,b) => {
      const ra = getRoom(a.entity_id), rb = getRoom(b.entity_id);
      if (ra !== rb) return ra.localeCompare(rb);
      // noise last
      const na = isNoiseSwitch(a.entity_id), nb = isNoiseSwitch(b.entity_id);
      if (na !== nb) return na ? 1 : -1;
      return (a.attributes?.friendly_name||a.entity_id).localeCompare(b.attributes?.friendly_name||b.entity_id);
    });

  const on = switches.filter(s => s.state === 'on').length;
  document.getElementById('switches-count').textContent = switches.length;
  document.getElementById('switches-stats').innerHTML =
    `<div class="stat"><strong>${switches.length}</strong> total</div>
     <div class="stat"><span class="on">ÔŚĆ</span> <strong>${on}</strong> on</div>
     <div class="stat"><span class="off">ÔŚĆ</span> <strong>${switches.length - on}</strong> off</div>`;

  const grid = document.getElementById('switches-grid');
  const q = grid.parentElement.querySelector('input')?.value.toLowerCase() || '';

  let html = '';
  let currentRoom = null;
  for (const sw of switches) {
    const room = getRoom(sw.entity_id);
    if (room !== currentRoom) {
      currentRoom = room;
      html += `<div class="group-label">${room}</div>`;
    }
    html += renderEntityCard(sw, 'switch');
  }
  grid.innerHTML = html;
  if (q) filterSection('switches', q);
}

// ÔöÇÔöÇÔöÇ Filter ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function filterSection(section, query) {
  const gridId = { auto: 'auto-grid', lights: 'lights-grid', switches: 'switches-grid' }[section];
  const grid = document.getElementById(gridId);
  const q = query.toLowerCase().trim();
  for (const card of grid.querySelectorAll('.entity-card')) {
    const name = card.dataset.name || '';
    card.classList.toggle('hidden', q.length > 0 && !name.includes(q));
  }
}

// ÔöÇÔöÇÔöÇ Timestamp refresh ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function refreshTimestamps() {
  // EP sensor times
  for (const [, sensors] of Object.entries(EP_GROUPS)) {
    for (const [, eid] of Object.entries(sensors)) {
      const el = document.getElementById(`ep-${eid.replace(/\./g,'-')}`);
      if (el && states[eid]) {
        const timeEl = el.querySelector('.ep-time');
        if (timeEl) timeEl.textContent = timeAgo(states[eid].last_changed);
      }
    }
  }
  // Entity card times
  for (const [eid, s] of Object.entries(states)) {
    const card = document.getElementById(`card-${eid.replace(/\./g,'-')}`);
    if (card) {
      const timeEl = card.querySelector('.entity-time');
      if (timeEl) timeEl.textContent = timeAgo(s.last_changed);
      // automation last_triggered
      const ltEl = card.querySelector('.auto-last-triggered span');
      if (ltEl && s.attributes?.last_triggered) {
        ltEl.textContent = timeAgo(s.attributes.last_triggered);
      }
    }
  }
}
setInterval(refreshTimestamps, 30000);

// ÔöÇÔöÇÔöÇ Single-entity update (no full re-render) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function updateEntityCard(entity) {
  const eid = entity.entity_id;
  const card = document.getElementById(`card-${eid.replace(/\./g,'-')}`);
  if (!card) return; // new entity, needs full render

  const s = entity.state;
  const domain = eid.split('.')[0];
  const dotCls = stateDotClass(s, domain);
  const lblCls = stateLabelClass(s);

  card.querySelector('.status-dot').className = `status-dot ${dotCls}`;
  const stateEl = card.querySelector('.entity-state');
  stateEl.className = `entity-state ${lblCls}`;
  stateEl.textContent = s;
  card.querySelector('.entity-time').textContent = timeAgo(entity.last_changed);

  if (domain === 'automation') {
    const ltEl = card.querySelector('.auto-last-triggered span');
    if (ltEl && entity.attributes?.last_triggered) {
      ltEl.textContent = timeAgo(entity.attributes.last_triggered);
    }
  }

  // Update stats bars
  if (domain === 'automation') updateAutoStats();
  if (domain === 'light') updateLightStats();
  if (domain === 'switch') updateSwitchStats();
}

function updateEpSensor(entity) {
  const eid = entity.entity_id;
  const el = document.getElementById(`ep-${eid.replace(/\./g,'-')}`);
  if (!el) return;
  const sv = entity.state;
  const stateEl = el.querySelector('.ep-sensor-state');
  const timeEl = el.querySelector('.ep-time');
  const isBinary = eid.startsWith('binary_sensor.');
  if (isBinary) {
    if (sv === 'on') { stateEl.className = 'ep-sensor-state detected'; stateEl.textContent = eid.includes('cloud') ? 'Online' : 'Detected'; }
    else if (sv === 'off') { stateEl.className = 'ep-sensor-state clear'; stateEl.textContent = eid.includes('cloud') ? 'Offline' : 'Clear'; }
    else { stateEl.className = 'ep-sensor-state unavailable'; stateEl.textContent = sv; }
  } else {
    const unit = entity.attributes?.unit_of_measurement || '';
    stateEl.textContent = `${sv} ${unit}`;
  }
  if (timeEl) timeEl.textContent = timeAgo(entity.last_changed);
}

function updateAutoStats() {
  const autos = Object.values(states).filter(s => s.entity_id.startsWith('automation.'));
  const on = autos.filter(a => a.state === 'on').length;
  document.getElementById('auto-stats').innerHTML =
    `<div class="stat"><strong>${autos.length}</strong> total</div>
     <div class="stat"><span class="on">ÔŚĆ</span> <strong>${on}</strong> enabled</div>
     <div class="stat"><span class="off">ÔŚĆ</span> <strong>${autos.length - on}</strong> disabled</div>`;
}
function updateLightStats() {
  const lights = Object.values(states).filter(s => s.entity_id.startsWith('light.') && !isNoiseLight(s.entity_id));
  const on = lights.filter(l => l.state === 'on').length;
  document.getElementById('lights-stats').innerHTML =
    `<div class="stat"><strong>${lights.length}</strong> total</div>
     <div class="stat"><span class="on">ÔŚĆ</span> <strong>${on}</strong> on</div>
     <div class="stat"><span class="off">ÔŚĆ</span> <strong>${lights.length - on}</strong> off</div>`;
}
function updateSwitchStats() {
  const switches = Object.values(states).filter(s => s.entity_id.startsWith('switch.'));
  const on = switches.filter(s => s.state === 'on').length;
  document.getElementById('switches-stats').innerHTML =
    `<div class="stat"><strong>${switches.length}</strong> total</div>
     <div class="stat"><span class="on">ÔŚĆ</span> <strong>${on}</strong> on</div>
     <div class="stat"><span class="off">ÔŚĆ</span> <strong>${switches.length - on}</strong> off</div>`;
}

// ÔöÇÔöÇÔöÇ Full render all sections ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function renderAll() {
  renderEP();
  renderAutomations();
  renderLights();
  renderSwitches();
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', {timeZone:'America/Chicago', hour:'2-digit', minute:'2-digit'}) + ' CT';
}

// ÔöÇÔöÇÔöÇ WebSocket ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function setConnStatus(cls, text) {
  document.getElementById('conn-dot').className = cls;
  document.getElementById('conn-text').textContent = text;
}

function connect() {
  setConnStatus('connecting', 'ConnectingÔÇŽ');
  ws = new WebSocket(HA_WS_URL);

  ws.onopen = () => {};

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);

    if (msg.type === 'auth_required') {
      ws.send(JSON.stringify({ type: 'auth', access_token: HA_TOKEN }));
    }
    else if (msg.type === 'auth_ok') {
      setConnStatus('connected', 'Live');
      // Get all states
      ws.send(JSON.stringify({ id: msgId++, type: 'get_states' }));
      // Subscribe to state_changed events
      ws.send(JSON.stringify({ id: msgId++, type: 'subscribe_events', event_type: 'state_changed' }));
    }
    else if (msg.type === 'auth_invalid') {
      setConnStatus('error', 'Auth Failed');
    }
    else if (msg.type === 'result' && msg.result && Array.isArray(msg.result)) {
      // get_states response
      for (const s of msg.result) {
        states[s.entity_id] = s;
      }
      renderAll();
    }
    else if (msg.type === 'event' && msg.event?.event_type === 'state_changed') {
      const data = msg.event.data;
      const newState = data.new_state;
      if (!newState) return;
      const eid = newState.entity_id;
      states[eid] = newState;

      // Targeted updates
      const domain = eid.split('.')[0];
      if (['automation','light','switch'].includes(domain)) {
        updateEntityCard(newState);
      }
      // EP entity?
      const isEP = Object.values(EP_GROUPS).some(g => Object.values(g).includes(eid));
      if (isEP) updateEpSensor(newState);
    }
  };

  ws.onclose = () => {
    setConnStatus('error', 'Disconnected');
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    setConnStatus('error', 'Error');
    ws.close();
  };
}

// ÔöÇÔöÇÔöÇ Section toggle ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ÔöÇÔöÇÔöÇ Boot ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
connect();
